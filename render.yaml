# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: datads-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: API_BASE_URL
        value: https://datads-mock-ad-apis.happygrass-47d99234.germanywestcentral.azurecontainerapps.io
      - key: FACEBOOK_API_KEY
        value: facebook_test_key_123
      - key: DATABASE_URL
        fromDatabase:
          name: datads-db
          property: connectionString

databases:
  - name: datads-db
    plan: free
    databaseName: datads
    user: datads
